<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f5f5f0;min-height:100vh;padding:2rem 1rem;color:#1a1a1a}
  .wrap{max-width:720px;margin:0 auto}
  .header{margin-bottom:1.5rem}
  .header h1{font-size:22px;font-weight:500}
  .header p{font-size:14px;color:#666;margin-top:4px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
  .stat{background:#fff;border-radius:10px;padding:0.75rem 1rem;text-align:center;border:0.5px solid #e0e0d8}
  .stat-n{font-size:22px;font-weight:500}
  .stat-l{font-size:12px;color:#888;margin-top:2px}
  .form-card{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:500}
  .field input,.field textarea{width:100%;font-family:system-ui,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f0;border:0.5px solid #ccc;border-radius:8px;padding:8px 12px;outline:none;transition:border-color 0.15s}
  .field input:focus,.field textarea:focus{border-color:#999;box-shadow:0 0 0 2px rgba(99,99,255,0.08)}
  .field textarea{resize:vertical;min-height:90px;line-height:1.6}
  .form-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .char-count{font-size:12px;color:#aaa}
  .btn-save{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:14px;font-weight:500;font-family:system-ui,sans-serif;cursor:pointer;transition:opacity 0.15s}
  .btn-save:hover{opacity:0.8}
  .btn-save:active{transform:scale(0.98)}
  .section-label{font-size:12px;font-weight:500;color:#aaa;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:10px}
  .search-row{display:flex;gap:8px;margin-bottom:1rem}
  .search-row input{flex:1;font-family:system-ui,sans-serif;font-size:14px;color:#1a1a1a;background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:7px 12px;outline:none}
  .search-row input:focus{border-color:#999}
  .empty{text-align:center;padding:2.5rem 1rem;color:#888;font-size:14px;background:#fff;border-radius:12px;border:0.5px dashed #ddd}
  .grid{display:flex;flex-direction:column;gap:10px}
  .prompt-card{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1rem 1.25rem;display:flex;gap:12px;align-items:flex-start;transition:border-color 0.15s}
  .prompt-card:hover{border-color:#bbb}
  .card-body{flex:1;min-width:0}
  .card-title{font-size:14px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-content{font-size:13px;color:#666;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-meta{font-size:12px;color:#aaa;margin-top:8px}
  .card-actions{display:flex;gap:6px;flex-shrink:0}
  .btn-copy,.btn-delete{background:none;border:0.5px solid #ddd;border-radius:8px;padding:5px 10px;font-size:12px;font-family:system-ui,sans-serif;cursor:pointer;color:#555;transition:all 0.15s;white-space:nowrap}
  .btn-copy:hover{background:#e8f0fe;color:#1a56db;border-color:#a4c2f4}
  .btn-copy.copied{background:#e6f4ea;color:#2d7d32;border-color:#a8d5b0}
  .btn-delete:hover{background:#fce8e6;color:#c5221f;border-color:#f5a09d}
  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;color:#fff;font-size:13px;padding:10px 18px;border-radius:8px;opacity:0;pointer-events:none;transition:opacity 0.2s;z-index:100}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Prompt library</h1>
    <p>Save, organize, and reuse your best prompts.</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="stat-total">0</div><div class="stat-l">saved</div></div>
    <div class="stat"><div class="stat-n" id="stat-words">0</div><div class="stat-l">avg words</div></div>
    <div class="stat"><div class="stat-n" id="stat-recent">—</div><div class="stat-l">last added</div></div>
  </div>

  <div class="form-card">
    <div class="field">
      <label for="inp-title">Title</label>
      <input id="inp-title" type="text" placeholder="e.g. Summarize meeting notes" maxlength="80" />
    </div>
    <div class="field">
      <label for="inp-content">Prompt</label>
      <textarea id="inp-content" placeholder="Write the full prompt text here…" maxlength="2000"></textarea>
    </div>
    <div class="form-footer">
      <span class="char-count" id="char-count">0 / 2000</span>
      <button class="btn-save" id="btn-save">Save prompt</button>
    </div>
  </div>

  <div class="section-label" id="lib-label">Library</div>
  <div class="search-row" id="search-row" style="display:none">
    <input id="inp-search" type="text" placeholder="Search prompts…" />
  </div>
  <div id="grid" class="grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let prompts = JSON.parse(localStorage.getItem('prompt-library') || '[]');
  prompts = prompts.map(p => ({ ...p, date: new Date(p.date) }));

  const titleEl = document.getElementById('inp-title');
  const contentEl = document.getElementById('inp-content');
  const charCount = document.getElementById('char-count');
  const gridEl = document.getElementById('grid');
  const searchEl = document.getElementById('inp-search');
  const searchRow = document.getElementById('search-row');

  contentEl.addEventListener('input', () => {
    charCount.textContent = contentEl.value.length + ' / 2000';
  });

  document.getElementById('btn-save').addEventListener('click', () => {
    const title = titleEl.value.trim();
    const content = contentEl.value.trim();
    if (!title) { shake(titleEl); return; }
    if (!content) { shake(contentEl); return; }
    prompts.unshift({ id: Date.now(), title, content, date: new Date() });
    save();
    titleEl.value = '';
    contentEl.value = '';
    charCount.textContent = '0 / 2000';
    render();
    showToast('Prompt saved');
  });

  function save() {
    localStorage.setItem('prompt-library', JSON.stringify(prompts));
  }

  function shake(el) {
    el.style.borderColor = '#c5221f';
    el.animate([{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(-4px)'},{transform:'translateX(0)'}],{duration:250,easing:'ease-out'});
    setTimeout(() => el.style.borderColor = '', 800);
  }

  function render() {
    const q = searchEl.value.toLowerCase();
    const filtered = q ? prompts.filter(p => p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q)) : prompts;

    document.getElementById('stat-total').textContent = prompts.length;
    if (prompts.length) {
      const avgWords = Math.round(prompts.reduce((a,p) => a + p.content.split(/\s+/).length, 0) / prompts.length);
      document.getElementById('stat-words').textContent = avgWords;
      const d = prompts[0].date;
      document.getElementById('stat-recent').textContent = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
    } else {
      document.getElementById('stat-words').textContent = '0';
      document.getElementById('stat-recent').textContent = '—';
    }

    searchRow.style.display = prompts.length > 2 ? '' : 'none';
    document.getElementById('lib-label').textContent = filtered.length ? `Library · ${filtered.length} prompt${filtered.length !== 1 ? 's' : ''}` : 'Library';

    if (!filtered.length) {
      gridEl.innerHTML = prompts.length
        ? `<div class="empty">No prompts match your search.</div>`
        : `<div class="empty">No prompts yet. Add your first one above.</div>`;
      return;
    }

    gridEl.innerHTML = filtered.map(p => {
      const d = p.date.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
      const words = p.content.split(/\s+/).length;
      return `<div class="prompt-card" id="card-${p.id}">
        <div class="card-body">
          <div class="card-title">${esc(p.title)}</div>
          <div class="card-content">${esc(p.content)}</div>
          <div class="card-meta">${d} · ${words} word${words !== 1 ? 's' : ''}</div>
        </div>
        <div class="card-actions">
          <button class="btn-copy" onclick="copyPrompt(${p.id}, this)">Copy</button>
          <button class="btn-delete" onclick="deletePrompt(${p.id})">Delete</button>
        </div>
      </div>`;
    }).join('');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function copyPrompt(id, btn) {
    const p = prompts.find(x => x.id === id);
    if (!p) return;
    navigator.clipboard.writeText(p.content).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    });
  }

  function deletePrompt(id) {
    const card = document.getElementById('card-' + id);
    if (card) {
      card.style.transition = 'opacity 0.2s, transform 0.2s';
      card.style.opacity = '0';
      card.style.transform = 'translateX(12px)';
    }
    setTimeout(() => {
      prompts = prompts.filter(p => p.id !== id);
      save();
      render();
      showToast('Prompt deleted');
    }, 200);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  searchEl.addEventListener('input', render);
  render();
</script>
</body>
</html>
