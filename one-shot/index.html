<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Prompt Library</h1>
        <form id="promptForm">
            <div class="form-group">
                <label for="title">Prompt Title</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label for="content">Prompt Content</label>
                <textarea id="content" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn save-btn">Save Prompt</button>
        </form>
        <div class="filters">
            <label for="sortFilter">Sort by:</label>
            <select id="sortFilter" onchange="setSortOrder(this.value)">
                <option value="newest">Newest</option>
                <option value="highest-rated">Highest Rated</option>
                <option value="most-rated">Most Ratings</option>
            </select>
        </div>
        <div id="promptsContainer" class="prompts-container">
            <!-- Prompts will be displayed here -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
