<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <h1>Prompt Library</h1>
        </div>
        <div class="main-layout">
            <section class="panel create-panel">
                <h2>Create Prompt</h2>
                <form id="promptForm">
                    <div class="form-group">
                        <label for="title">Prompt Title</label>
                        <input type="text" id="title" placeholder="Enter prompt title" required>
                    </div>
                    <div class="form-group">
                        <label for="content">Prompt Content</label>
                        <textarea id="content" rows="8" placeholder="Enter prompt content" required></textarea>
                    </div>
                    <button type="submit" class="btn save-btn">Save Prompt</button>
                </form>
            </section>
            <section class="panel list-panel">
                <div class="list-header">
                    <h2>Saved Prompts</h2>
                </div>
                <div id="promptsContainer" class="prompts-container">
                    <!-- Prompts will be displayed here -->
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
